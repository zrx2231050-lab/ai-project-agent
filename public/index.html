<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 项目 Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="nav">
        <div class="brand">
          <p>多 Agent 项目知识工作台</p>
          <h1>AI 项目 Agent</h1>
        </div>
        <nav class="nav-list" aria-label="主导航">
          <button class="nav-button active" type="button" data-view="dashboard">总览</button>
          <button class="nav-button" type="button" data-view="documents">资料</button>
          <button class="nav-button" type="button" data-view="tasks">任务</button>
          <button class="nav-button" type="button" data-view="risks">风险</button>
          <button class="nav-button" type="button" data-view="qa">问答</button>
          <button class="nav-button" type="button" data-view="briefs">简报</button>
          <button class="nav-button" type="button" data-view="runs">运行轨迹</button>
        </nav>
      </aside>

      <section class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="viewEyebrow">Dashboard</p>
            <h2 id="viewTitle">项目总览</h2>
          </div>
          <div class="metrics" id="metrics"></div>
        </header>
        <section id="viewRoot" class="view"></section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
